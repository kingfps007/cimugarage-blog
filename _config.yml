# ============================================================
# cimugarage.cn 博客站 · Hexo 主配置
# 站点：https://cimugarage.cn
# 文档：BLOG_MIGRATION_DESIGN.md v0.5.1
# 规则：.trae/rules/blog_workflow.md v0.5
# ============================================================

# ====== 基础 ======
title: 此木的车间
subtitle: 个人博客 · 专题文章 · 技术折腾 · 生活记录
description: 此木的车间——一个中文 + 英文双语的个人博客，分享技术学习与生活记录。
keywords: 此木的车间, cimugarage, 博客, 个人网站
author: 此木的车间
email: 2479010668@qq.com
url: https://cimugarage.cn
root: /
# hexo 7 没有真正的原生多语言框架（只有 UI 字符串翻译 __()）
# 中英两版用 front matter 的 path 字段强制路由：
#   - 中文 source/about/index.md          → 渲染到 /about/
#   - 英文 source/about/en.md (path: en/about) → 渲染到 /en/about/
language: zh-CN
timezone: Asia/Shanghai

# ====== 备案号（D5 合规底线，P0 第一步必填） ======
icp: '晋ICP备2026000871号-1'
police: '晋公网安备14010902001829号'

# ====== 目录 ======
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
skip_render:

# ====== 文章（Hexo 7 原生 i18n） ======
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
marked:
  prependRoot: true
  postAsset: true
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: true
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false

# ====== 首页 ======
# hexo 7 默认 index_generator 会输出到 /，与 _posts/index.md 冲突
# 显式 path: 'off' 禁用，由 _posts/index.md 提供 /
index_generator:
  path: 'off'
  per_page: 10
  order_by: -date

# ====== 分类 / 标签页 ======
category_generator:
  per_page: 20
tag_generator:
  per_page: 20

# ====== 归档 / 关于 ======
archive_generator:
  per_page: 0
  yearly: true
  monthly: true

# ====== 永久链接 ======
# 文章：/<slug>/（不带 lang 前缀，由 front matter path 强制双语）
permalink: :title/
permalink_defaults:
  pretty_urls:
    trailing_index: true

# ====== 主题（cimu-kb submodule） ======
theme: cimu-kb

# ====== 部署（ESA Pages） ======
deploy:
  type: ''  # 静态站，无需 hexo-deployer

# ====== 主题 _config.yml 注入（cimu-kb） ======
theme_config:
  # 站点
  menu:
    zh-CN:
      home: /
      archives: /archives/
      categories: /categories/
      tags: /tags/
      about: /about/
    en:
      home: /en/
      archives: /en/archives/
      categories: /en/categories/
      tags: /en/tags/
      about: /en/about/

  # 默认语言
  default_language: zh-CN

  # 代码高亮
  hljs: true

  # 头像
  avatar: /assets/images/common/avatar.webp

  # 浏览数开关（自建 ESA 函数 + KV）
  view_counter: self-hosted
  view_counter_endpoint: /api/view/count

  # 评论开关
  comment:
    enabled: true
    endpoint: /api/comments
    submit_endpoint: /api/comment
    admin_endpoint: /admin/comments

  # 人生倒计时（仅 about 页）
  life_progress:
    enabled: true
    show: true
    birth_date: '1990-01-01'  # ← 改为实际出生日期（默认不公开）

  # 封面图三段兜底
  cover_placeholder: /assets/images/common/cover-placeholder.webp

  # 暗色模式（user_profile 偏好：不跟随系统，默认 light）
  dark_mode:
    enabled: true
    default: light  # 不要改成 'auto'，必须显式切换
    persistence: localStorage

  # 最后更新警告
  last_updated_warning: 90  # 90 天

# ====== 元数据 ======
since: 2018
favicon: /favicon.svg
apple_touch_icon: /assets/images/common/apple-touch-icon.png

# ====== JSON-LD 站点信息（设计稿 §12.6.6） ======
jsonld:
  site_name: 此木的车间
  site_url: https://cimugarage.cn
  author:
    name: 此木的车间
    url: https://cimugarage.cn/about/
  logo: /assets/images/common/logo.svg
  license: https://creativecommons.org/licenses/by/4.0/

# ====== 性能 / SEO ======
sitemap:
  path: sitemap.xml
  rel: false
  tags: true
  categories: true

feed:
  type: rss2
  path: rss2.xml
  limit: 20
  content: false
  content_limit: 140
  content_limit_delim: ' [...]'

# ====== 元插件（仅启用设计稿确认的） ======
plugins:
  - hexo-renderer-stylus
  # - hexo-server  # 本地预览用，不入依赖
