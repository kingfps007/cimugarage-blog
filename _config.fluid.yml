# ============================================================
# hexo-theme-fluid 用户配置（覆盖默认）
# 文档：https://hexo.fluid-dev.com/docs/guide/
# ============================================================

# 浏览器图标
favicon: /favicon.svg
apple_touch_icon: /favicon.svg

# Iconfont（本地化，避免 Aliyun CDN）
# font_1749284 是 fluid 核心图标（home/archive/tag 等）
iconfont: /css/iconfont2/iconfont.css

# 导航栏
navbar:
  blog_title: 此木的车间
  menu:
    - { key: 'home',     link: '/',                 icon: 'iconfont icon-home-fill' }
    - { key: 'archive',  link: '/archives/',         icon: 'iconfont icon-archive-fill' }
    - { key: 'category', link: '/categories/',       icon: 'iconfont icon-category-fill' }
    - { key: 'tag',      link: '/tags/',             icon: 'iconfont icon-tags-fill' }
    - { key: 'about',    link: '/about/',            icon: 'iconfont icon-user-fill' }
    - { key: 'privacy',  link: '/about/privacy/',    icon: 'iconfont icon-shield-fill' }
    - { key: 'english',  link: '/en/',               name: 'English',     icon: 'iconfont icon-globe' }

# 首页 Banner
index:
  banner_img: /assets/images/common/cover-placeholder.webp
  banner_img_height: 65
  banner_mask_alpha: 0.3
  slogan:
    enable: true
    text: 一个中文 + 英文双语的个人博客
  auto_generate_excerpt: true
  post_url_target: _self

# 归档页
archive:
  banner_img: /assets/images/common/cover-placeholder.webp
  banner_img_height: 50
  banner_mask_alpha: 0.3
  post_url_target: _self

# 分类页
category:
  banner_img: /assets/images/common/cover-placeholder.webp
  banner_img_height: 60
  banner_mask_alpha: 0.3

# 标签页
tag:
  banner_img: /assets/images/common/cover-placeholder.webp
  banner_img_height: 60
  banner_mask_alpha: 0.3

# 全局页脚
footer:
  content: '
    <a href="https://hexo.io" target="_blank" rel="nofollow noopener"><b>Hexo</b></a> 主题 <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener"><b>Fluid</b></a> 驱动
  '
  beian:
    enable: true
    icp_text: 晋ICP备2026000871号-1
    icp_url: https://beian.miit.gov.cn/
    police_text: 晋公网安备14010902001829号
    police_url: https://beian.mps.gov.cn/

# 文章页
post:
  banner_img: /assets/images/common/cover-placeholder.webp
  banner_img_height: 70
  banner_mask_alpha: 0.3
  default_index_img: /assets/images/common/cover-placeholder.webp
  toc:
    enable: true
    show_number: true
  copyright:
    enable: true
    author:
      enable: true
      name: 此木的车间
      url: /
  reward:
    enable: false
  comments:
    enable: true
    type: discuss    # P2 阶段会替换为 ESA 函数
  tag:
    enable: true
    icon: iconfont icon-tag-fill
  meta_first: true
  hint:
    enable: true
  # 备案号见全局 footer 配置

# 关于页
about:
  banner_img: /assets/images/common/cover-placeholder.webp
  banner_img_height: 70
  banner_mask_alpha: 0.3
  avatar: /assets/images/common/avatar.webp
  name: 此木的车间
  intro: 一个中文 + 英文双语的个人博客

# 暗色模式（user_profile 偏好：不跟随系统，默认 light）
dark_mode:
  enable: true
  default: light    # 'light' | 'dark'，禁 'auto'
  auto: false

# 本地搜索
search:
  enable: true
  path: /local-search.xml
  field: post
  format: html
  limit: 10

# 代码块
code:
  copy_btn: true
  highlight:
    enable: true
    line_threshold: 0
    lang:
      - shell
      - yaml
      - javascript
      - typescript
      - css
      - json
      - python
      - bash
      - nginx
      - plaintext
      - diff
      - java
      - go

# 打字机效果
fun_features:
  typing:
    enable: true
    typeSpeed: 70
    cursorChar: '|'
    loop: true
    sleep: 100

# 锚点
anchorjs:
  enable: true
  element: h1,h2,h3,h4,h5,h6
  placement: right
  visible: 'hover'

# 阅读进度条
progress_bar:
  enable: true
  height: 2px
  color: '#1e90ff'

# 链接页（友链）
links:
  enable: false

# 数学公式
math:
  enable: false

# Mermaid
mermaid:
  enable: false

# 静态资源（全部本地化，不用 baomitu / aliyun CDN）
static_prefix:
  internal_js: /js
  internal_css: /css
  internal_img: /img
  anchor: ''
  github_markdown: ''
  jquery: ''
  bootstrap: ''
  prismjs: ''

# 评论（fluid 内置 discuss 占位，P2 阶段接 ESA 函数）
# comment:
#   type: discuss
