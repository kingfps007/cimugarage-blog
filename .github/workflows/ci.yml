name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: 验证（双语 + 链接 + 构建）
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || echo "Lint warnings only, continue"

      - name: 双语一致性检查
        run: bash scripts/check-bilingual.sh

      - name: 链接有效性检查
        run: bash scripts/check-links.sh || echo "Link check warnings only, continue"

      - name: 构建
        run: npm run build

      - name: 上传构建产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: public
          path: public/
          retention-days: 7

  lighthouse:
    name: Lighthouse 审计
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: public

      - name: 起静态服务器
        run: |
          npx --yes http-server public -p 8080 -s &
          sleep 3

      - name: 跑 Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/
            http://localhost:8080/about/
          budgetPath: ./lighthouse-budget.json
          uploadArtifacts: true
