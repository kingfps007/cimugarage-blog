# cimu-kb — 此木暖通车间自定义 Hexo 主题
# 通用主题：支持 kb（知识库） | blog（博客）两种 site_type
# 共享 cimu-kb 仓库 → 同时被 hvac-lab 与 cimugarage-blog 引用

# ============================================================
# 站点类型：'kb'（默认）= 知识库三栏布局
#         'blog'      = 博客（报纸感首页 + 文章页用知识库风格）
# 默认 kb，blog 站点在自己的 _config.cimu-kb.yml 显式覆盖
# ============================================================
site_type: kb

# ============================================================
# 通用配置
# ============================================================
dark_mode:
  enabled: true
  default: light  # 不要改成 'auto'，必须显式切换（user_profile 硬约束）

# 浏览数：自建 ESA 函数 + KV
view_counter: self-hosted

# 评论组件（自建 ESA 函数）
comment:
  enabled: true
  endpoint: /api/comments

# 人生倒计时（仅 about 页）
life_progress:
  enabled: true
  birth_date: '1990-01-01'  # ← 改为实际出生日期

# ============================================================
# blog 模式专属
# ============================================================