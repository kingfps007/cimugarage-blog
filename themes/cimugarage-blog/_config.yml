# ============================================================
# cimugarage-blog 主题配置
# 独立主题（不复用 cimu-kb，保护 hvac 站）
# ============================================================

# 站点基础（少量覆盖主配置，主题层可读 site.config 兜底）
site:
  title: 此木的车间
  subtitle: 个人博客 · 专题文章 · 技术折腾 · 生活记录
  description: 此木的车间——一个中文 + 英文双语的个人博客，分享技术学习与生活记录。
  author: 此木的车间
  url: https://cimugarage.cn

# 备案号（合规底线，footer 必带）
icp: '晋ICP备2026000871号-1'
police: '晋公网安备14010902001829号'
beian_url: 'https://beian.miit.gov.cn/'

# 双语菜单
menu:
  zh-CN:
    - { id: home,      text: 首页,       url: / }
    - { id: archives,  text: 归档,       url: /archives/ }
    - { id: tags,      text: 标签,       url: /tags/ }
    - { id: about,     text: 关于,       url: /about/ }
    - { id: privacy,   text: 隐私政策,   url: /about/privacy/ }
  en:
    - { id: home,      text: Home,       url: /en/ }
    - { id: archives,  text: Archives,   url: /en/archives/ }
    - { id: tags,      text: Tags,       url: /en/tags/ }
    - { id: about,     text: About,      url: /en/about/ }
    - { id: privacy,   text: Privacy,    url: /en/about/privacy/ }

# 暗色模式（user_profile 偏好：不跟随系统，默认 light，必须显式切换）
dark_mode:
  enabled: true
  default: light  # 'light' | 'dark'，禁止 'auto'
  persistence: localStorage

# 人生倒计时（仅 about 页用）
life_progress:
  enabled: true
  birth_date: '1990-01-01'  # ← 改为实际出生日期（默认不公开 show: false）
  show: false  # 默认关闭，保护隐私

# 封面图兜底
cover_placeholder: /assets/images/common/cover-placeholder.webp

# 最后更新警告（天）
last_updated_warning: 90

# 首页文章数
home_posts_per_page: 10
